# This workflow uploads a Python Package using Twine when a release is created.
# It requires the "release" environment configured in GitHub repo settings
# and a trusted publisher configured on PyPI.

name: Upload Python Package

on:
  release:
    types: [created, edited]

jobs:
  tests:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.14"]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run Tests
        run: uv run --group tests pytest
      - name: Run Linting
        run: |
          uv run --group linting pylint sapsucker
          uv run --group linting pylint --recursive=y examples
      - name: Run Type Check
        run: |
          uv run --group type_check mypy --show-error-codes src/sapsucker --strict
          uv run --group type_check mypy --show-error-codes examples/sapsucker --strict --ignore-missing-imports
      - name: Run Spell Check
        run: |
          uv run --group spell_check codespell --ignore-words=domain-specific-terms.txt src
          uv run --group spell_check codespell --ignore-words=domain-specific-terms.txt examples
          uv run --group spell_check codespell --ignore-words=domain-specific-terms.txt README.md
      - name: Run Coverage
        run: |
          uv run --group coverage coverage run -m pytest
          uv run --group coverage coverage report --fail-under 90 --omit "unittests/*"

  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.14"]
        os: [ubuntu-latest]
    # Specifying a GitHub environment, which is strongly recommended by PyPI:
    # https://docs.pypi.org/trusted-publishers/adding-a-publisher/
    environment: release
    permissions:
        # IMPORTANT: this permission is mandatory for trusted publishing
        id-token: write
    needs: tests
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel and source distributions
        run: uv build
      - name: Publish distribution 📦 to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
